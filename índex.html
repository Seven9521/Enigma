<body>

  <br>

  <button onclick="verificar()">Verificar</button>

  <p id="mensagem"></p>

  <script>

    function normalizar(texto) {
      return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    const fases = [
      {

        resposta: "seja bem vindo"
      },
      {
        pergunta: "Phv hp txh qdvfl (dica: Cifra)",
        resposta: "marco"
      },
      {
        pergunta: "https://pt.wikipedia.org/wiki/Cristianismo",
        resposta: "7"
      },
      {
  pergunta: "the first song",
  resposta: "sereia"
},
{
  pergunta: "3 minutos e 50 segundos",
  resposta: "picole"
},
{
  pergunta: "A mente humana tem limites. Um estudo sugere que conseguimos guardar apenas 7 coisas ao mesmo tempo.",
  resposta: "miller"
},
{
  pergunta: "01110101 01101110 01111001 01100110 01101100 01110100 01110111 01100110 01111000",
  resposta: "pitagoras"
},
{

  resposta: "1988"
},
{
  pergunta: "Nada disso é sobre respostas.\n\nÉ sobre quem insiste em procurá-las.\n\n",
  resposta: "eu"
},
{
  pergunta: "A genialidade raramente anda sozinha.\n\nhttps://pt.wikipedia.org/wiki/Albert_Einstein\n\nEncontre alguém que dividiu o mesmo reconhecimento que ele.\n\nNem sempre são lembrados juntos.\n\nNão lembro o seu primeiro nome...",
  resposta: "bohr"
},
{
  pergunta: 'A escuridão me acalma...<br><br><span style="color:black;">clé</span>',
  resposta: "chave"
},
{
  pergunta: `
    <div>
      <span style="color:black;">
      01000001 01100011 01101000 01101111 01110101 00100000 01110001 01110101 01100101 00100000 01110011 01100101 01110010 01101001 01100001 00100000 01100110 11000011 10100001 01100011 01101001 01101100 00100000 01100001 01110011 01110011 01101001 01101101 00111111
      </span>
    </div>

    <br><br>

    <div style="margin-top:50px;">
      <span style="color:black;">
      01000100 01101111 01101110 01101111 00100000 01100100 01101111 00100000 01000101 01101110 01101001 01100111 01101101 01100001
      </span>
    </div>
  `,
  resposta: "bruno"
},
{
  pergunta: "Eu tenho medo. https://pt.wikipedia.org/wiki/Rutilismo",
  resposta: "ruivas"
},
{
  pergunta: "Boa Sorte?",
  resposta: "liberdade"
},
{
  pergunta: "isaias: 6 1-3",
  resposta: "serafim"
},
{
  pergunta: "paciência é uma virtude. 3301",
  resposta: "cicada"
},
{
  pergunta: "Não sou nada.Nunca serei nada.Não posso querer ser nada.À parte isso, tenho em mim todos os sonhos do mundo.Janelas do meu quarto, Do meu quarto de um dos milhões do mundo que ninguém sabe quem é (E se soubessem quem é, o que saberiam?), Dais para o mistério de uma rua cruzada constantemente por gente,Para uma rua inacessível a todos os pensamentos,Real, impossivelmente real, certa, desconhecidamente certa.",
  resposta: "tabacaria"
}
     ];

    function carregarFase() {
  document.getElementById("pergunta").innerHTML = fases[faseAtual].pergunta;
  document.getElementById("resposta").value = "";
  document.getElementById("mensagem").innerText = "";

  // aviso só na primeira fase
  if (faseAtual === 0) {
    document.getElementById("aviso").innerText =
      "AVISO!!! > As respostas do enigma não precisam de maiúsculo ou acentuação.";
  } else {
    document.getElementById("aviso").innerText = "";
  }
}

    function verificar() {
      let resposta = document.getElementById("resposta").value.toLowerCase();
      resposta = normalizar(resposta);

      if (resposta === fases[faseAtual].resposta) {
        document.getElementById("mensagem").innerText = "Correto...";

        faseAtual++;
        localStorage.setItem("faseAtual", faseAtual);

        if (faseAtual < fases.length) {
          setTimeout(carregarFase, 900);
        } else {
          document.body.innerHTML = "<h1>Parabéns!! você completou o enigma. Digite 9521 no numero do criador para receber o seu certificado.</h1>";
        }

      } else {
  let erros = [
    "Errado...",
    "Não é isso...",
    "Tente novamente...",
    "Você está perto... ou não."
  ];

  let msg = erros[Math.floor(Math.random() * erros.length)];

  document.getElementById("mensagem").innerText = msg;

  setTimeout(function() {
    document.getElementById("mensagem").innerText = "";
  }, 2000);
}
    }

    carregarFase();
  </script>
